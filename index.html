<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0c10" />
    <title>El castillo de Rubi</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header class="app__header">
        <div>
          <p class="app__eyebrow">TextRPG progresivo</p>
          <h1>El castillo de Rubi</h1>
        </div>
        <div class="app__status" id="statusBar">
          <span class="badge">Piso 0</span>
          <span class="badge">Nivel 1</span>
          <span class="badge">Salud 100%</span>
        </div>
      </header>

      <main class="app__main">
        <section class="panel" id="screen">
          <h2>Bienvenido</h2>
          <p>
            Elige comenzar una nueva
            partida o continuar tu progreso.
          </p>
          <div class="panel__actions">
            <button class="btn btn--primary" id="newGameBtn">
              Nueva partida
            </button>
            <button class="btn btn--ghost" id="continueBtn">
              Continuar
            </button>
          </div>
        </section>

        <section class="panel panel--scroll" id="log">
          <h3>Bitacora</h3>
          <ul class="log" id="logList">
            <li>El castillo aguarda...</li>
          </ul>
        </section>
      </main>

      <footer class="app__footer">
        <button class="tab tab--active" data-tab="explore">Explorar</button>
        <button class="tab" data-tab="inventory">Inventario</button>
        <button class="tab" data-tab="skills">Habilidades</button>
        <button class="tab" data-tab="settings">Ajustes</button>
      </footer>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
